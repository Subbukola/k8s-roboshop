apiVersion: apps/v1 
kind: Deployment
metadata: 
  name: mongodb
  namespace: roboshop
  labels:
    env: dev
    component: mongodb
    project: roboshop

spec:
  replicas: 2
  selector:
    matchLabels:
      env: dev
      component: mongodb
      project: roboshop
  template:
    metadata:
      labels:
        env: dev
        component: mongodb
        project: roboshop
    spec:
      containers:
        - name: mongodb 
          image: subbukola541/mongodb:1.0

          
---
apiVersion: v1
kind: Service
metadata:  
  name: mongodb
  namespace: roboshop 
  labels:
    env: dev
    component: mongodb
    project: roboshop

spec:
  selector:
    env: dev
    component: mongodb
    project: roboshop
  ports:
    - targetPort: 27017 
      port: 27017 
      protocol: TCP

      
      



