apiVersion: v1 
kind: configMap
metadata: 
  name: catalogue 
  namespace: roboshop
  labels:
    env: dev
    component: catalogue 
    project: roboshop

data:
  MONGO: true
  MONGO_URL: "mongodb://mongodb:27017/catalogue"

---
apiVersion: apps/v1 
kind: Deployment
metadata: 
  name: catalogue 
  namespace: roboshop
  labels:
    env: dev
    component: catalogue 
    project: roboshop

spec:
  replicas: 2
  selector:
    matchLabels:
      env: dev
      component: catalogue
      project: roboshop
  template:
    metadata:
      labels:
        env: dev
        component: catalogue 
        project: roboshop
    spec:
      containers:
        - name: catalogue 
          image: subbukola541/catalogue:1.0
          imagePullPolicy: Always
          resources:
            requests:
              memory: "100Mi"
              cpu: "100m"
            limits:
              memory: "150Mi"
              cpu: "1000m"

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2

          liveinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 2


          
---
apiVersion: v1
kind: Service
metadata:  
  name: catalogue
  namespace: roboshop 
  labels:
    env: dev
    component: catalogue
    project: roboshop

spec:
  selector:
    env: dev
    component: catalogue
    project: roboshop
  ports:
    - targetPort: 8080 
      port: 8080
      protocol: TCP

      
      



