apiVersion: v1 
kind: ConfigMap
metadata: 
  name: shipping 
  namespace: roboshop
  labels:
    env: dev
    component: shipping 
    project: roboshop

data:
  CART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"

---

apiVersion: apps/v1 
kind: Deployment
metadata: 
  name: shipping 
  namespace: roboshop
  labels:
    env: dev
    component: shipping 
    project: roboshop

spec:
  replicas: 2
  selector:
    matchLabels:
      env: dev
      component: shipping
      project: roboshop
  template:
    metadata:
      labels:
        env: dev
        component: shipping 
        project: roboshop
    spec:
      containers:
        - name: shipping 
          image: subbukola541/shipping:1.0
          imagePullPolicy: Always
          resources:
            requests:
              memory: "500Mi"
              cpu: "100m"
            limits:
              memory: "800Mi"
              cpu: "1000m"

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2          
              
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 2
          
          
          envFrom:
            - configMapRef:
                name: shipping


          
---
apiVersion: v1
kind: Service
metadata:  
  name: shipping
  namespace: roboshop 
  labels:
    env: dev
    component: shipping
    project: roboshop

spec:
  selector:
    env: dev
    component: shipping
    project: roboshop
  ports:
    - targetPort: 8080 
      port: 8080
      protocol: TCP

      
      



