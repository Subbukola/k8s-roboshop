
---
apiVersion: apps/v1 
kind: Deployment
metadata: 
  name: mysql
  namespace: roboshop
  labels:
    env: dev
    component: mysql
    project: roboshop

spec:
  replicas: 2
  selector:
    matchLabels:
      env: dev
      component: mysql
      project: roboshop
  template:
    metadata:
      labels:
        env: dev
        component: mysql
        project: roboshop
    spec:
      containers:
        - name: mysql 
          image: subbukola541/mysql:1.0

          
---
apiVersion: v1
kind: Service
metadata:  
  name: mysql
  namespace: roboshop 
  labels:
    env: dev
    component: mysql
    project: roboshop

spec:
  selector:
    env: dev
    component: mysql
    project: roboshop
  ports:
    - targetPort: 3306 
      port: 3306 
      protocol: TCP

      
      



