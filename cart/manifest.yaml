apiVersion: v1 
kind: ConfigMap
metadata: 
  name: cart 
  namespace: roboshop
  labels:
    env: dev
    component: cart
    project: roboshop

data:
  REDIS_HOST: redis
  CATALOGUE_HOST: catalogue
  CATALOGUE_PORT: 8080

---

apiVersion: apps/v1 
kind: Deployment
metadata: 
  name: cart 
  namespace: roboshop
  labels:
    env: dev
    component: cart 
    project: roboshop

spec:
  replicas: 2
  selector:
    matchLabels:
      env: dev
      component: cart 
      project: roboshop
  template:
    metadata:
      labels:
        env: dev
        component: cart 
        project: roboshop
    spec:
      containers:
        - name: cart 
          image: subbukola541/cart:1.0
          imagePullPolicy: Always
          resources:
            requests:
              memory: "100Mi"
              cpu: "100m"
            limits:
              memory: "300Mi"
              cpu: "1000m"

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2          
              
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 2
          
          
          envFrom:
            - configMapRef:
                name: cart 


          
---
apiVersion: v1
kind: Service
metadata:  
  name: cart 
  namespace: roboshop 
  labels:
    env: dev
    component: cart 
    project: roboshop

spec:
  selector:
    env: dev
    component: cart 
    project: roboshop
  ports:
    - targetPort: 8080 
      port: 8080
      protocol: TCP

      
      



